name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # The build itself runs on a single pinned modern JDK; the published
      # artifacts are made JDK-specific by their compile targets:
      #   logback-android      -> Java 11 bytecode, minSdk 26
      #   logback-android-jdk8 -> Java 8 bytecode, minSdk 21
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble all JDK variants
        run: ./gradlew assembleRelease

      - name: Verify bytecode targets
        run: |
          set -eux
          check() {
            aar="$1"; want="$2"
            dir=$(mktemp -d)
            unzip -q "$aar" classes.jar -d "$dir"
            unzip -q "$dir/classes.jar" 'ch/qos/logback/classic/Logger.class' -d "$dir"
            major=$(od -An -j6 -N2 -d "$dir/ch/qos/logback/classic/Logger.class" | tr -d ' ')
            test "$major" = "$want"
          }
          # class file major version: Java 11 = 55, Java 8 = 52
          ls -la logback-android/build/outputs/aar/
          check logback-android/build/outputs/aar/logback-android-jdk11-release.aar 55
          check logback-android/build/outputs/aar/logback-android-jdk8-release.aar 52

      - name: Unit tests (jdk11 variant)
        run: ./gradlew testJdk11DebugUnitTest

      - name: Unit tests (jdk8 variant)
        run: ./gradlew testJdk8DebugUnitTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: logback-android/build/reports/
