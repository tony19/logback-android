name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # build across both modern LTS JDKs; the published artifacts are
        # made JDK-specific by their compile targets:
        #   logback-android      -> Java 11 bytecode, minSdk 26
        #   logback-android-jdk8 -> Java 8 bytecode, minSdk 21
        #
        # agp: the Android Gradle Plugin version to build with (overrides the
        # gradle.properties default). AGP 9.3.0+ lint requires JDK 21, so JDK 17
        # stays on 9.2.1 while JDK 21 exercises the newer plugin.
        include:
          - java: 17
            agp: '9.2.1'
          - java: 21
            agp: '9.3.0'
    env:
      ORG_GRADLE_PROJECT_agpVersion: ${{ matrix.agp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble all JDK variants
        run: ./gradlew assembleRelease

      - name: Verify bytecode targets
        run: |
          set -eux
          check() {
            aar="$1"; want="$2"
            dir=$(mktemp -d)
            unzip -q "$aar" classes.jar -d "$dir"
            unzip -q "$dir/classes.jar" 'ch/qos/logback/classic/Logger.class' -d "$dir"
            # class-file major version: low byte of the big-endian u16 at offset 6
            major=$(od -An -j7 -N1 -tu1 "$dir/ch/qos/logback/classic/Logger.class" | tr -d ' ')
            test "$major" = "$want"
          }
          # class file major version: Java 11 = 55, Java 8 = 52
          ls -la logback-android/build/outputs/aar/
          check logback-android/build/outputs/aar/logback-android-jdk11-release.aar 55
          check logback-android/build/outputs/aar/logback-android-jdk8-release.aar 52

      - name: Lint
        run: ./gradlew lint

      - name: Unit tests (jdk11 variant)
        run: ./gradlew testJdk11DebugUnitTest

      - name: Unit tests (jdk8 variant)
        run: ./gradlew testJdk8DebugUnitTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: logback-android/build/reports/

      - name: Upload release AARs
        if: matrix.java == 21
        uses: actions/upload-artifact@v7
        with:
          name: release-aars
          path: logback-android/build/outputs/aar/

  test_app:
    name: Test App
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # JDK 17: required to build logback-android (see the build job) and by the
      # newer Android Gradle plugin the downstream logback-test-app uses.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # android-35 builds logback-android (matching the build job); android-36 /
      # build-tools 36.0.0 are what logback-test-app compiles against
      # (compileSdk 36, buildToolsVersion '36.0.0').
      - name: Install Android SDK packages
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-35 platforms;android-36 build-tools;36.0.0'

      # Read the versions being tested so logback-test-app can be pointed at the
      # build-under-test instead of its released default.
      - name: Read versions under test
        id: versions
        run: |
          echo "logback=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "slf4j=$(grep '^slf4jVersion=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # Deploy the build-under-test to the local Maven repo (~/.m2), where
      # logback-test-app resolves com.github.tony19:logback-android from. The
      # app declares minSdk 23, so it must consume the jdk8 variant (minSdk 21);
      # publish just that variant under the base coordinate the app references
      # (see gradle/publish-module.gradle). Signing is skipped automatically
      # since CI configures no PGP keys; mavenLocal consumers don't need
      # signatures.
      - name: Publish logback-android (jdk8 variant) to Maven local
        run: ./gradlew publishReleaseJdk8PublicationToMavenLocal -PpublishJdk8UnderBaseArtifactId --no-configuration-cache

      # Use the tagged release of the test app so the CI flow is reproducible.
      - name: Checkout app code
        run: git clone --branch v0.0.2 --depth 1 https://github.com/tony19-sandbox/logback-test-app.git

      # logback-test-app resolves com.github.tony19:logback-android:${logbackAndroidVersion}
      # from mavenLocal; override its released default with the build-under-test.
      - name: Test app
        run: |
          cd logback-test-app
          ./gradlew test \
            -PlogbackAndroidVersion=${{ steps.versions.outputs.logback }} \
            -Pslf4jVersion=${{ steps.versions.outputs.slf4j }}
