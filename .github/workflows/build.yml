name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # build across both modern LTS JDKs; the published artifacts are
        # made JDK-specific by their compile targets:
        #   logback-android      -> Java 11 bytecode, minSdk 26
        #   logback-android-jdk8 -> Java 8 bytecode, minSdk 21
        java: [17, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble all JDK variants
        run: ./gradlew assembleRelease

      - name: Verify bytecode targets
        run: |
          set -eux
          check() {
            aar="$1"; want="$2"
            dir=$(mktemp -d)
            unzip -q "$aar" classes.jar -d "$dir"
            unzip -q "$dir/classes.jar" 'ch/qos/logback/classic/Logger.class' -d "$dir"
            # class-file major version: low byte of the big-endian u16 at offset 6
            major=$(od -An -j7 -N1 -tu1 "$dir/ch/qos/logback/classic/Logger.class" | tr -d ' ')
            test "$major" = "$want"
          }
          # class file major version: Java 11 = 55, Java 8 = 52
          ls -la logback-android/build/outputs/aar/
          check logback-android/build/outputs/aar/logback-android-jdk11-release.aar 55
          check logback-android/build/outputs/aar/logback-android-jdk8-release.aar 52

      - name: Lint
        run: ./gradlew lint

      - name: Unit tests (jdk11 variant)
        run: ./gradlew testJdk11DebugUnitTest

      - name: Unit tests (jdk8 variant)
        run: ./gradlew testJdk8DebugUnitTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: logback-android/build/reports/

      - name: Upload release AARs
        if: matrix.java == 21
        uses: actions/upload-artifact@v4
        with:
          name: release-aars
          path: logback-android/build/outputs/aar/

  test_app:
    name: Test App
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # the downstream test app has its own Gradle toolchain requiring JDK 17+
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Checkout app code
        run: git clone https://github.com/tony19-sandbox/logback-test-app.git

      - name: Download release AARs
        uses: actions/download-artifact@v4
        with:
          name: release-aars
          path: aar

      # Use the jdk8 variant: its minSdk 21 floor is closest to the old
      # single artifact's, so the existing test app consumes it unchanged
      - name: Copy logback-android to app libs
        run: |
          mkdir -p logback-test-app/app/libs
          cp aar/logback-android-jdk8-release.aar logback-test-app/app/libs/logback-android-release.aar

      - name: Test app
        run: cd logback-test-app && ./gradlew test
